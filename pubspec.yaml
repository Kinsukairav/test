name: windows_music_player
description: A comprehensive Windows Music Player with YouTube integration
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.4.5
  http: ^1.1.0
  json_annotation: ^4.8.1
  media_kit: ^1.1.11
  media_kit_libs_windows_audio: ^1.0.9
  path: ^1.8.3
  shared_preferences: ^2.2.2
  file_selector: ^0.9.3+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
