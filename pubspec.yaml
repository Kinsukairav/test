name: windows_music_player
description: A comprehensive Windows Music Player with YouTube integration
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI and Theming
  cupertino_icons: ^1.0.6
  
  # State Management
  flutter_riverpod: ^2.4.5
  
  # Audio Player - Windows compatible
  audioplayers: ^6.1.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # HTTP requests for YouTube API
  http: ^1.1.0
  
  # JSON parsing
  json_annotation: ^4.8.1
  
  # Path utilities
  path: ^1.8.3
  
  # Process management for yt-dlp
  process_run: ^0.12.5+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/audio/
